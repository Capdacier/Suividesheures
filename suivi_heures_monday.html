<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi des heures</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f1117;
    color: #e8e6e0;
    min-height: 100vh;
    padding: 24px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #f0ece4;
    letter-spacing: -0.3px;
  }

  .item-name {
    font-size: 12px;
    color: #7a7870;
    margin-top: 2px;
  }

  .refresh-btn {
    background: #1e2028;
    border: 1px solid #2a2d38;
    color: #7a7870;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .refresh-btn:hover {
    background: #252830;
    color: #c9a96e;
    border-color: #c9a96e44;
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: #7a7870;
    font-size: 14px;
    gap: 10px;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid #2a2d38;
    border-top-color: #c9a96e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: #1a1218;
    border: 1px solid #3d1f1f;
    border-radius: 10px;
    padding: 16px;
    color: #e07070;
    font-size: 13px;
    line-height: 1.6;
  }

  .total-card {
    background: linear-gradient(135deg, #c9a96e22, #c9a96e11);
    border: 1px solid #c9a96e44;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .total-label {
    font-size: 12px;
    color: #c9a96e;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .total-hours {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #c9a96e;
  }

  .total-unit {
    font-size: 14px;
    color: #c9a96e99;
    margin-left: 4px;
  }

  .types-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .type-row {
    background: #1a1c24;
    border: 1px solid #2a2d38;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  .type-row:hover {
    border-color: #3a3d4a;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .type-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .type-name {
    flex: 1;
    font-size: 14px;
    color: #c8c6c0;
    font-weight: 400;
  }

  .type-bar-wrap {
    flex: 2;
    height: 4px;
    background: #2a2d38;
    border-radius: 2px;
    overflow: hidden;
  }

  .type-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .type-hours {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #f0ece4;
    min-width: 52px;
    text-align: right;
  }

  .type-pct {
    font-size: 11px;
    color: #5a5850;
    min-width: 36px;
    text-align: right;
  }

  .empty {
    text-align: center;
    padding: 40px;
    color: #5a5850;
    font-size: 13px;
  }

  .config-banner {
    background: #1a1c24;
    border: 1px dashed #2a2d38;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 12px;
    color: #5a5850;
    margin-top: 16px;
    line-height: 1.6;
  }

  .config-banner code {
    background: #252830;
    padding: 2px 6px;
    border-radius: 4px;
    color: #c9a96e;
    font-size: 11px;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">Suivi des heures</div>
    <div class="item-name" id="item-name">—</div>
  </div>
  <button class="refresh-btn" onclick="init()">↻ Actualiser</button>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div> Chargement...</div>
</div>

<script>
const API_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjYzNzAwMDQwNiwiYWFpIjoxMSwidWlkIjoxMDEzMTIwMzQsImlhZCI6IjIwMjYtMDMtMjRUMTI6NDI6MjguMDAwWiIsInBlciI6Im1lOndyaXRlIiwiYWN0aWQiOjI5MzMxNzM4LCJyZ24iOiJ1c2UxIn0.4cNtSG8_pLtMm6Hpgy-nw0ovElFSVwTInrOjQ-8HcI8';
const BOARD_ID = '18218820114';
const COL_TYPE  = 'lookup_mm1zhkqf';
const COL_HEURES = 'lookup_mm1zr8p6';

const COLORS = ['#4aad85','#c9a96e','#6e8dc9','#c96e8d','#8dc96e','#c96e6e','#6ec9c9','#a96ec9'];

function getItemIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('itemId') || params.get('item_id') || null;
}

async function query(q) {
  const res = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: {
      'Authorization': API_TOKEN,
      'Content-Type': 'application/json',
      'API-Version': '2024-01'
    },
    body: JSON.stringify({ query: q })
  });
  return res.json();
}

async function init() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div> Chargement...</div>';

  try {
    // Trouver l'item — soit via URL param, soit on prend les premiers items du board
    const itemId = getItemIdFromUrl();

    let gql;
    if (itemId) {
      gql = `{ items(ids:[${itemId}]) { id name column_values(ids:["${COL_TYPE}","${COL_HEURES}"]) { id value display_value } } }`;
    } else {
      // Mode démo — prend le premier item du board
      gql = `{ boards(ids:[${BOARD_ID}]) { items_page(limit:1) { items { id name column_values(ids:["${COL_TYPE}","${COL_HEURES}"]) { id value display_value } } } } }`;
    }

    const data = await query(gql);

    let item;
    if (itemId) {
      item = data.data?.items?.[0];
    } else {
      item = data.data?.boards?.[0]?.items_page?.items?.[0];
    }

    if (!item) {
      showError('Aucun item trouvé. Assure-toi que le board ID est correct et que tu as les permissions.');
      return;
    }

    document.getElementById('item-name').textContent = item.name;

    const cols = item.column_values;
    const colType   = cols.find(c => c.id === COL_TYPE);
    const colHeures = cols.find(c => c.id === COL_HEURES);

    let types = [];
    let heures = [];

    // Parser les valeurs miroir
    try {
      const tv = colType?.display_value || colType?.value || '';
      const hv = colHeures?.display_value || colHeures?.value || '';

      // Les colonnes lookup retournent des valeurs séparées par virgule ou newline
      types  = tv.split(/[,\n]/).map(s => s.trim()).filter(Boolean);
      heures = hv.split(/[,\n]/).map(s => parseFloat(s.trim()) || 0).filter((_, i) => i < types.length);
    } catch(e) {
      console.error('Parse error:', e);
    }

    if (types.length === 0) {
      document.getElementById('content').innerHTML = '<div class="empty">Aucune donnée disponible pour cet item.</div><div class="config-banner">Colonnes attendues : <code>' + COL_TYPE + '</code> (type de temps) et <code>' + COL_HEURES + '</code> (heures). Vérifie que les colonnes miroir sont bien configurées.</div>';
      return;
    }

    // Agréger par type
    const totaux = {};
    types.forEach((type, i) => {
      const t = type || 'Non défini';
      const h = heures[i] || 0;
      totaux[t] = (totaux[t] || 0) + h;
    });

    const total = Object.values(totaux).reduce((a, b) => a + b, 0);

    // Rendu
    let html = `
      <div class="total-card">
        <div>
          <div class="total-label">Total heures</div>
        </div>
        <div><span class="total-hours">${total.toFixed(1)}</span><span class="total-unit">h</span></div>
      </div>
      <div class="types-grid">
    `;

    Object.entries(totaux)
      .sort((a, b) => b[1] - a[1])
      .forEach(([type, h], i) => {
        const pct = total > 0 ? (h / total * 100) : 0;
        const color = COLORS[i % COLORS.length];
        html += `
          <div class="type-row" style="animation-delay:${i * 0.06}s">
            <div class="type-dot" style="background:${color}"></div>
            <div class="type-name">${type}</div>
            <div class="type-bar-wrap">
              <div class="type-bar" style="width:${pct}%;background:${color}"></div>
            </div>
            <div class="type-hours">${h.toFixed(1)}h</div>
            <div class="type-pct">${pct.toFixed(0)}%</div>
          </div>
        `;
      });

    html += '</div>';
    document.getElementById('content').innerHTML = html;

  } catch(err) {
    showError('Erreur API : ' + err.message);
  }
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="error">⚠️ ${msg}</div>`;
}

init();
</script>
</body>
</html>
